<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="birdwatch — spatial audio for your AI agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <!-- a flying-bird mark, centred on origin, ~24 wide -->
    <g id="bird">
      <path d="M-12,0 Q-6,-9 0,-2 Q6,-9 12,0" fill="none" stroke-width="2.4" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- ===== Right: the aviary — birds orbiting the listener ===== -->
  <g transform="translate(865,150)">
    <circle r="170" fill="url(#glow)"/>
    <!-- orbit rings -->
    <g fill="none" stroke="#21262d" stroke-width="1.5">
      <circle r="60"/><circle r="110"/><circle r="162"/>
    </g>
    <!-- listener at centre -->
    <circle r="9" fill="#e6edf3"/>
    <circle r="16" fill="none" stroke="#e6edf3" stroke-opacity="0.4" stroke-width="1.5"/>

    <!-- distant birds (depth) -->
    <use href="#bird" transform="translate(215,-55) scale(0.8) rotate(-8)" stroke="#8b949e" opacity="0.45"/>
    <use href="#bird" transform="translate(-165,60) scale(0.8) rotate(8)" stroke="#8b949e" opacity="0.45"/>

    <!-- near birds, each a different species → different hue -->
    <use href="#bird" transform="translate(115,-80) scale(1.4) rotate(-12)" stroke="#f0883e"/>
    <use href="#bird" transform="translate(40,-92) scale(1.1) rotate(-16)" stroke="#d2a8ff"/>
    <use href="#bird" transform="translate(168,-8) scale(1.2) rotate(4)" stroke="#58a6ff"/>
    <use href="#bird" transform="translate(120,72) scale(1.3) rotate(9)" stroke="#7ee787"/>
    <use href="#bird" transform="translate(-110,-70) scale(1.2) rotate(-7)" stroke="#e3b341"/>
    <use href="#bird" transform="translate(-150,-2) scale(1.4) rotate(3)" stroke="#ff7b72"/>
    <use href="#bird" transform="translate(-95,78) scale(1.1) rotate(11)" stroke="#56d4dd"/>
    <use href="#bird" transform="translate(35,96) scale(1.0) rotate(13)" stroke="#79c0ff"/>
  </g>

  <!-- ===== Left: wordmark ===== -->
  <g transform="translate(72,0)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <use href="#bird" transform="translate(20,86) scale(1.3)" stroke="#7ee787"/>
    <text x="0" y="162" font-size="66" font-weight="700" letter-spacing="-2" fill="#e6edf3">birdwatch</text>
    <text x="2" y="200" font-size="19" fill="#8b949e">spatial audio for your AI agents</text>
    <text x="2" y="232" font-size="14" fill="#6e7681">Claude Code · Codex · Hermes · OpenClaw — each project sings as a different bird</text>
  </g>
</svg>
