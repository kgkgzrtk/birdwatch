name: Release

# Tag-driven releases following the de-facto `vX.Y.Z` convention.
# Bump .claude-plugin/plugin.json, commit, then push a matching tag:
#   git tag -a v0.2.1 -m "birdwatch 0.2.1" && git push origin v0.2.1
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin.json version matches the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(jq -r .version .claude-plugin/plugin.json)"
          echo "tag=$tag  plugin.json=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match plugin.json version $ver"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: birdwatch ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
