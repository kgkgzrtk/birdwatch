name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck -x scripts/*.sh

  python:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check
      - name: Format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  test:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y bats sox jq
      - name: Run tests
        run: bats test/
